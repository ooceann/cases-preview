<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMind预览</title>
<!-- 换国内加速CDN + region:cn适配国内网络 -->
<script src="https://cdn.jsdelivr.net/npm/xmind-embed-viewer@1.2.0/dist/umd/xmind-embed-viewer.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
.tool{padding:12px;background:#fff;border-bottom:1px solid #eee}
#sel{padding:5px 10px;width:320px}
#box{width:100%;height:calc(100vh - 55px)}
</style>
</head>
<body>
<div class="tool">
<select id="sel">
<option value="">请选择xmind</option>
<!-- =========手动在这里填你的文件名，不再自动扫目录======== -->
<option value="testcases/登录.xmind">登录</option>
<option value="testcases/支付.xmind">支付</option>
</select>
</div>
<div id="box"></div>
<script>
// region:cn 使用国内资源，解决白屏关键配置
const v = new XMindEmbedViewer({el:'#box',theme:'light',region:'cn'});
const sel = document.getElementById('sel');
sel.onchange = async()=>{
  const p = sel.value;
  if(!p)return;
  const buf = await(await fetch(p)).arrayBuffer();
  v.load(buf);
}
</script>
</body>
</html>
