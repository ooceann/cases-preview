<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMind 测试用例预览</title>
<script src="https://cdn.jsdelivr.net/npm/xmind-embed-viewer@1.2.0/dist/umd/xmind-embed-viewer.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
.toolbar{padding:14px 20px;background:#fff;border-bottom:1px solid #eee}
#fileSelect{padding:6px 12px;width:340px;font-size:14px}
#viewer{width:100vw;height:calc(100vh - 56px)}
</style>
</head>
<body>
<div class="toolbar">
  <select id="fileSelect">
    <option value="">-- 选择用例 --</option>
    <!-- 在这里加你的 xmind 文件 -->
    <option value="testcases/登录模块.xmind">登录模块</option>
    <option value="testcases/支付模块.xmind">支付模块</option>
  </select>
</div>
<div id="viewer"></div>

<script>
const viewer = new XMindEmbedViewer({
  el: "#viewer",
  theme: "light",
  region: "cn"
});

document.getElementById("fileSelect").addEventListener("change", async e => {
  const path = e.target.value;
  if (!path) return;
  const buffer = await (await fetch(path)).arrayBuffer();
  viewer.load(buffer);
});
</script>
</body>
</html>
