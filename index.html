<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMind 用例预览</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{padding:15px;background:#f6f7f9;font-family:Arial}
  .panel{margin-bottom:15px}
  select{padding:8px 12px;width:100%;max-width:400px;border-radius:6px;border:1px solid #ccc}
  #preview{margin-top:10px;background:white;padding:10px;border-radius:8px}
  #preview svg{width:100%;height:auto}
</style>
</head>
<body>

<div class="panel">
  <select id="fileSelect">
    <option value="">-- 选择用例 --</option>
    <!-- 这里放你导出的 SVG 文件 -->
    <option value="testcases/登录.svg">登录模块</option>
    <option value="testcases/支付.svg">支付模块</option>
  </select>
</div>

<div id="preview"></div>

<script>
const preview = document.getElementById('preview');
const select = document.getElementById('fileSelect');

select.addEventListener('change', async () => {
  const path = select.value;
  if (!path) {
    preview.innerHTML = '';
    return;
  }

  try {
    const resp = await fetch(path);
    const text = await resp.text();
    preview.innerHTML = text;
  } catch (e) {
    preview.innerHTML = '加载失败';
  }
});
</script>

</body>
</html>
