<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMind 预览（无Pages版）</title>
    <script src="https://unpkg.com/xmind-embed-viewer@1.1.0/dist/umd/xmind-embed-viewer.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: "Segoe UI", Roboto, sans-serif; background: #f8f9fa; }
        .toolbar { padding:12px 20px; background:#fff; border-bottom:1px solid #eee; display:flex; align-items:center; gap:12px; }
        #xmindSelector { padding:6px 12px; font-size:14px; border:1px solid #ddd; border-radius:6px; min-width:300px; }
        #viewer { width:100vw; height:calc(100vh - 56px); background:#fff; }
    </style>
</head>
<body>
    <div class="toolbar">
        <label>选择用例：</label>
        <select id="xmindSelector"><option value="">-- 加载中... --</option></select>
    </div>
    <div id="viewer"></div>

    <script>
        // ========== 填你的企业GitHub信息 ==========
        const OWNER = "zhan";
        const REPO = "cases-preview";
        const BRANCH = "main";
        const PATH = "testcases";

        const viewer = new XMindEmbedViewer({ el:"#viewer", theme:"light" });
        const selector = document.getElementById("xmindSelector");

        // 1. 动态拉取所有 xmind（不用Pages）
        async function loadXmindList() {
            try {
                const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?ref=${BRANCH}`;
                const res = await fetch(apiUrl);
                const files = await res.json();
                const xmindFiles = files
                    .filter(f => f.name.endsWith(".xmind"))
                    .map(f => ({ name: f.name, path: f.path }));

                selector.innerHTML = `<option value="">-- 请选择用例 --</option>`;
                xmindFiles.forEach(f => {
                    const opt = document.createElement("option");
                    opt.value = f.path;
                    opt.textContent = f.name.replace(".xmind", "");
                    selector.appendChild(opt);
                });
            } catch (e) {
                selector.innerHTML = `<option value="">加载失败（网络/权限）</option>`;
                console.error(e);
            }
        }

        // 2. 用 raw.githubusercontent.com 加载 xmind（关键：不用Pages）
        selector.addEventListener("change", async () => {
            const path = selector.value;
            if (!path) return;
            const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path}`;
            const res = await fetch(rawUrl);
            const buf = await res.arrayBuffer();
            viewer.load(buf);
        });

        loadXmindList();
    </script>
</body>
</html>
