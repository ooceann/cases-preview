<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XMind 测试用例预览</title>
  <script src="https://unpkg.com/xmind-embed-viewer@1.1.0/dist/umd/xmind-embed-viewer.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; }
    .toolbar {
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #xmindSelect {
      padding: 6px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      min-width: 320px;
    }
    #viewer {
      width: 100vw;
      height: calc(100vh - 56px);
      background: #fff;
    }
  </style>
</head>
<body>

<div class="toolbar">
  <label>选择测试用例：</label>
  <select id="xmindSelect">
    <option value="">-- 加载中 --</option>
  </select>
</div>
<div id="viewer"></div>

<script>
const viewer = new XMindEmbedViewer({ el: '#viewer', theme: 'light' });
const select = document.getElementById('xmindSelect');

// 自动加载 testcases 目录下所有 .xmind 文件
async function loadXmindList() {
  try {
    const res = await fetch('./testcases/');
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'text/html');

    const options = [];
    const links = doc.querySelectorAll('a');

    links.forEach(a => {
      const href = a.getAttribute('href');
      if (href.endsWith('.xmind')) {
        const name = a.textContent.trim().replace('.xmind', '');
        options.push({ name, path: href });
      }
    });

    select.innerHTML = '<option value="">-- 请选择用例 --</option>';
    options.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.path;
      opt.textContent = item.name;
      select.appendChild(opt);
    });
  } catch (err) {
    select.innerHTML = '<option value="">加载失败</option>';
    console.error(err);
  }
}

// 切换预览
select.addEventListener('change', async () => {
  const path = select.value;
  if (!path) return;

  try {
    const res = await fetch(path);
    const buffer = await res.arrayBuffer();
    viewer.load(buffer);
  } catch (e) {
    alert('加载失败：' + e.message);
  }
});

loadXmindList();
</script>
</body>
</html>
