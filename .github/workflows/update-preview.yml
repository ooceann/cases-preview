name: Auto Update preview.html
on:
  push:
    branches: [ main ]
    paths:
      - 'testcases/**'   # 只有改 testcases 时才触发
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 扫描 testcases 并生成 preview.html
        run: |
          # 1. 收集所有 xmind
          cd testcases
          XMIND_FILES=$(ls *.xmind 2>/dev/null || true)
          cd ..

          # 2. 生成 JS 数组（用于注入 html）
          LIST_JS=""
          for f in $XMIND_FILES; do
            ESC=$(echo "$f" | sed 's/"/\\"/g')
            LIST_JS+="{name:\"$ESC\",path:\"testcases/$ESC\"},"
          done

          # 3. 替换 preview.html 里的列表（这里用简单 sed 注入）
          # 下面这行把一个占位注释替换成最新列表
          sed -i.bak "s|//<!--XMIND_LIST-->|const xmindList = [${LIST_JS}]|" preview.html
          rm -f preview.html.bak

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preview.html
          git commit -m "auto: update xmind list" || echo "nothing to commit"
          git push
